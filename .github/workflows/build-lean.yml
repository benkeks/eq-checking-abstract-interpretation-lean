name: Build Lean docs for GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assemble Pages site
        run: |
          mkdir -p _site
          if [ -f index.pdf ]; then
            cp index.pdf _site/index.pdf
          fi
          cp site/index.html _site/index.html
          touch _site/.nojekyll

      - name: Set up Lean
        uses: leanprover/lean-action@v1

      - name: Build Lean docs
        run: |
          rm -rf docbuild
          mkdir -p docbuild/docs
          cat > docbuild/lakefile.toml <<'EOF'
          name = "docbuild"
          reservoir = false
          version = "0.1.0"
          packagesDir = ".lake/packages"
          defaultTargets = ["EqCheckingAbstractInterpretation"]

          [[require]]
          name = "EqCheckingAbstractInterpretation"
          path = "."

          [[require]]
          scope = "leanprover"
          name = "doc-gen4"
          rev = "v4.29.1"
          EOF
          cp lean-toolchain docbuild/lean-toolchain
          cp bibliography.bib docbuild/docs/references.bib
          cd docbuild
          MATHLIB_NO_CACHE_ON_UPDATE=1 lake update EqCheckingAbstractInterpretation
          MATHLIB_NO_CACHE_ON_UPDATE=1 lake update doc-gen4
          DOCGEN_SRC=github lake build EqCheckingAbstractInterpretation:docs
          cd ..
          mkdir -p _site/docs
          cp -r docbuild/.lake/build/doc/. _site/docs

      - name: Download current published paper PDF
        run: |
          curl --fail --location --silent --show-error \
            https://benkeks.github.io/eq-checking-abstract-interpretation/index.pdf \
            --output _site/process-equivalence-checking-as-abstract-interpretation.pdf

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
